

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HelpHub AI — Notifications</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="toast" class="toast"></div>

<header id="navbar">
  <div class="container nav-inner">
    <a class="nav-logo" href="index.html"><div class="logo-icon">H</div><span class="logo-text">HelpHub AI</span></a>
    <nav class="nav-links" id="navLinks"></nav>
    <div class="nav-actions" id="navActions"></div>
  </div>
</header>

<div class="container page-wrap space-y">
  <div class="hero-grad">
    <div class="hero-content">
      <p class="label" style="color:#a8a29e;margin-bottom:8px;">NOTIFICATIONS</p>
      <h1 style="font-size:clamp(22px,4vw,36px);font-weight:900;color:#fff;line-height:1.2;">Stay updated on requests, helpers, and trust signals.</h1>
    </div>
  </div>
  <div class="glass p-6">
    <div class="flex items-center justify-between mb-6">
      <div><p class="label mb-2">LIVE UPDATES</p><h3 style="font-size:24px;font-weight:800;">Notification feed</h3></div>
      <button class="btn-secondary" onclick="markAllRead()">Mark all as read</button>
    </div>
    <div id="notifList"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
currentPageName='notifications';
if(!requireAuth()){}else{
renderNavbar('notifications');

function renderPage(){
  document.getElementById('notifList').innerHTML=notifications.map(n=>`
    <div class="notif-row" onclick="markRead('${n.id}')">
      <div style="flex:1;min-width:0;">
        <p class="${n.read?'notif-title-read':'notif-title-unread'}">${n.title}</p>
        <p class="notif-meta">${typeLabel(n.type)} • ${timeAgo(n.timestamp)}</p>
      </div>
      <span class="${n.read?'notif-badge-read':'notif-badge-unread'}">${n.read?'Read':'Unread'}</span>
    </div>
  `).join('');
}
renderPage();
}
</script>
</body>
</html>
