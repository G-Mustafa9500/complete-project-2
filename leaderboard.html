<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HelpHub AI — Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="toast" class="toast"></div>

<header id="navbar">
  <div class="container nav-inner">
    <a class="nav-logo" href="index.html"><div class="logo-icon">H</div><span class="logo-text">HelpHub AI</span></a>
    <nav class="nav-links" id="navLinks"></nav>
    <div class="nav-actions" id="navActions"></div>
  </div>
</header>

<div class="container page-wrap space-y">
  <div class="hero-grad">
    <div class="hero-content">
      <p class="label" style="color:#a8a29e;margin-bottom:8px;">LEADERBOARD</p>
      <h1 style="font-size:clamp(22px,4vw,36px);font-weight:900;color:#fff;line-height:1.2;">Recognize the people who keep the community moving.</h1>
    </div>
  </div>
  <div class="grid-2">
    <div class="glass p-6">
      <p class="label mb-3">TOP HELPERS</p>
      <h3 style="font-size:22px;font-weight:800;margin-bottom:1.5rem;">Rankings</h3>
      <div class="space-3" id="lbRankings"></div>
    </div>
    <div class="glass p-6">
      <p class="label mb-3">BADGE SYSTEM</p>
      <h3 style="font-size:22px;font-weight:800;margin-bottom:1.5rem;">Trust and achievement</h3>
      <div class="space-4" id="lbBadges"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
currentPageName='leaderboard';
renderNavbar('leaderboard');

function renderPage(){
  const sorted=[...DB_USERS].sort((a,b)=>b.trustScore-a.trustScore);
  document.getElementById('lbRankings').innerHTML=sorted.map((u,i)=>`
    <div class="rank-row">
      <div class="avatar ${AVATAR_COLORS[i%AVATAR_COLORS.length]}">${getInitials(u.name)}</div>
      <div class="rank-info">
        <p class="rank-name">#${i+1} ${u.name}</p>
        <p class="rank-skills">${u.skills.join(', ')||'No skills listed'}</p>
      </div>
      <div class="rank-score">
        <p class="rank-pct">${u.trustScore}%</p>
        <p class="rank-contribs">${u.contributions} contributions</p>
      </div>
    </div>
  `).join('');
  document.getElementById('lbBadges').innerHTML=sorted.map(u=>`
    <div style="padding:1rem;border-radius:12px;background:#f9f8f6;border:1px solid #e7e5e4;">
      <div class="trust-bar-wrap mb-3"><div class="trust-bar-fill" style="width:${u.trustScore}%"></div></div>
      <p style="font-size:16px;font-weight:800;margin-bottom:8px;">${u.name}</p>
      <div class="flex flex-wrap gap-2">${u.badges.map(b=>`<span class="badge ${BADGE_COLORS[b]||'badge-stone'}">${b}</span>`).join('')}</div>
    </div>
  `).join('');
}
renderPage();
</script>
</body>
</html>
